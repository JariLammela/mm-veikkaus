<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>MM-veikkaus 2026</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: #e2e8f0;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

#podium {
  display: flex;
  justify-content: center;
  align-items: end;
  gap: 15px;
  margin-bottom: 30px;
  flex-wrap: wrap;
}

.podium-card {
  background: #1e293b;
  border-radius: 12px;
  padding: 15px;
  text-align: center;
  min-width: 180px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

.gold { border: 3px solid gold; transform: scale(1.05); }
.silver { border: 3px solid silver; }
.bronze { border: 3px solid #cd7f32; }

#stats, #updated, #matchesTitle {
  text-align: center;
  margin-bottom: 10px;
}

#updated {
  color: #94a3b8;
  font-size: 14px;
}

.card {
  background: #1e293b;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

.top1 { border-left: 6px solid gold; }
.top2 { border-left: 6px solid silver; }
.top3 { border-left: 6px solid #cd7f32; }

.name {
  font-size: 18px;
  font-weight: bold;
}

.points {
  float: right;
  font-size: 18px;
}

.details {
  margin-top: 8px;
  font-size: 14px;
  color: #94a3b8;
}

.badge {
  display: inline-block;
  padding: 4px 8px;
  border-radius: 6px;
  background: #334155;
  margin-right: 5px;
  margin-top: 5px;
}

.match-meta {
  color: #94a3b8;
  font-size: 13px;
  margin-top: 4px;
}
</style>
</head>

<body>

<div class="container">

  <h1>⚽🏆 FIFA World Cup 2026 - Veikkaus</h1>

  <div id="podium"></div>

  <div id="stats"></div>
  <div id="updated"></div>

  <h2 id="matchesTitle">⏭ Seuraavat 24h ottelut</h2>
  <div id="matches"></div>

  <div id="list"></div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxjUWbC3vZohnI2ig40tF18Z5-Ba62S6ff8QDtHhhX55nQn1TtH6B5_vS4I_ly1AfY5Dg/exec";

let previousScores = JSON.parse(localStorage.getItem("prevScores") || "{}");

/* =========================
   FIX: robust date parsing
========================= */
function parseDate(v) {
  if (v instanceof Date) return v;

  if (!v) return new Date(NaN);

  const parts = v.split(/[\s\/:]/);

  // dd/mm/yyyy hh:mm:ss
  return new Date(
    parts[2],        // year
    parts[1] - 1,    // month
    parts[0],        // day
    parts[3] || 0,
    parts[4] || 0,
    parts[5] || 0
  );
}

function getClass(index) {
  if (index === 0) return "card top1";
  if (index === 1) return "card top2";
  if (index === 2) return "card top3";
  return "card";
}

function renderPodium(data) {

  const top3 = data.slice(0, 3);

  document.getElementById("podium").innerHTML = `
    <div class="podium-card silver">
      <h2>🥈</h2>
      <div>${top3[1]?.name || "-"}</div>
      <strong>${top3[1]?.total || 0} p</strong>
    </div>

    <div class="podium-card gold">
      <h1>🥇</h1>
      <div>${top3[0]?.name || "-"}</div>
      <strong>${top3[0]?.total || 0} p</strong>
    </div>

    <div class="podium-card bronze">
      <h2>🥉</h2>
      <div>${top3[2]?.name || "-"}</div>
      <strong>${top3[2]?.total || 0} p</strong>
    </div>
  `;
}

/* =========================
   MATCH RENDER
========================= */
function renderMatches(matches) {

  const el = document.getElementById("matches");
  el.innerHTML = "";

  if (!matches || matches.length === 0) {
    el.innerHTML = "<div class='card'>Ei tulevia otteluita 24h sisällä</div>";
    return;
  }

  matches.forEach(m => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div style="font-weight:bold">${m.match}</div>
      <div class="match-meta">
        ${new Date(m.time).toLocaleString("fi-FI")} • Lohko ${m.group || "-"} • 📺 ${m.tv || "-"}
      </div>
    `;

    el.appendChild(div);
  });
}

/* =========================
   RANKING
========================= */
function render(data) {

  const el = document.getElementById("list");
  el.innerHTML = "";

  data.forEach((p, i) => {

    const prev = previousScores[p.name] || 0;
    const diff = p.total - prev;

    let diffText = "";
    if (diff > 0) diffText = `<span style="color:#22c55e; margin-left:6px;">▲${diff}</span>`;
    else if (diff < 0) diffText = `<span style="color:#ef4444; margin-left:6px;">▼${Math.abs(diff)}</span>`;

    const div = document.createElement("div");
    div.className = getClass(i);

    div.innerHTML = `
      <div>
        <span class="name">#${i + 1} ${p.name}</span>
        <span class="points">${p.total} p${diffText}</span>
      </div>

      <div class="details">
        <span class="badge">Alkusarja: ${p.sections.Alkusarja || 0}</span>
        <span class="badge">Top32: ${p.sections.top32 || 0}</span>
        <span class="badge">Top16: ${p.sections.top16 || 0}</span>
        <span class="badge">Top8: ${p.sections.top8 || 0}</span>
        <span class="badge">Top4: ${p.sections.top4 || 0}</span>
      </div>
    `;

    el.appendChild(div);
  });
}

/* =========================
   LOAD DATA
========================= */
async function load() {

  try {

    const res = await fetch(API_URL);
    const data = await res.json();

    const ranking = data.ranking || data;

    renderPodium(ranking);
    render(ranking);

    document.getElementById("stats").innerHTML =
      `👥 Osallistujia: ${ranking.length}`;

    document.getElementById("updated").innerHTML =
      `⏰ Päivitetty: ${new Date().toLocaleTimeString("fi-FI")}`;

    /* =========================
       FIXED MATCH FILTERING
    ========================= */
    const matchesRaw = data.nextMatches || [];

    const now = new Date();
    const nextMatches = matchesRaw
      .map(r => ({
        time: parseDate(r.time),
        match: r.match,
        group: r.group,
        tv: r.tv
      }))
      .filter(m =>
        m.time instanceof Date &&
        !isNaN(m.time) &&
        m.time > now &&
        m.time < new Date(now.getTime() + 24 * 60 * 60 * 1000)
      )
      .sort((a, b) => a.time - b.time);

    renderMatches(nextMatches);

    /* store previous scores */
    let scoreMap = {};
    ranking.forEach(p => scoreMap[p.name] = p.total);

    localStorage.setItem("prevScores", JSON.stringify(scoreMap));
    previousScores = scoreMap;

  } catch (err) {

    document.getElementById("updated").innerHTML =
      "⚠️ Tietojen lataus epäonnistui";

    console.error(err);
  }
}

load();
setInterval(load, 30000);

</script>

</body>
</html>

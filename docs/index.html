<!DOCTYPE html>

<html lang="fi">
<head>
<meta charset="UTF-8">
<title>MM-veikkaus 2026</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: #e2e8f0;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

#podium {
  display: flex;
  justify-content: center;
  align-items: end;
  gap: 15px;
  margin-bottom: 30px;
  flex-wrap: wrap;
}

.podium-card {
  background: #1e293b;
  border-radius: 12px;
  padding: 15px;
  text-align: center;
  min-width: 180px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

.gold { border: 3px solid gold; transform: scale(1.05); }
.silver { border: 3px solid silver; }
.bronze { border: 3px solid #cd7f32; }

#stats, #updated {
  text-align: center;
  margin-bottom: 10px;
}

#updated {
  color: #94a3b8;
  font-size: 14px;
}

.card {
  background: #1e293b;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

.top1 { border-left: 6px solid gold; }
.top2 { border-left: 6px solid silver; }
.top3 { border-left: 6px solid #cd7f32; }

.name {
  font-size: 18px;
  font-weight: bold;
}

.points {
  float: right;
  font-size: 18px;
}

.details {
  margin-top: 8px;
  font-size: 14px;
  color: #94a3b8;
}

.badge {
  display: inline-block;
  padding: 4px 8px;
  border-radius: 6px;
  background: #334155;
  margin-right: 5px;
  margin-top: 5px;
}

.match {
  margin-bottom: 10px;
}

.match-meta {
  color: #94a3b8;
  font-size: 13px;
}

/* Veikkausprosentit */

.predictions {
  margin-top: 10px;
}

.prediction-bar {
  display: flex;
  width: 100%;
  height: 28px;
  border-radius: 8px;
  overflow: hidden;
  background: #334155;
  margin-bottom: 6px;
}

.prediction-home,
.prediction-draw,
.prediction-away {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: bold;
  white-space: nowrap;
}

.prediction-home {
  background: #16a34a;
  color: white;
}

.prediction-draw {
  background: #ca8a04;
  color: white;
}

.prediction-away {
  background: #dc2626;
  color: white;
}

.prediction-labels {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: #cbd5e1;
}
</style>

</head>

<body>

<div class="container">

  <h1>⚽🏆 FIFA World Cup 2026 - Veikkaus</h1>

  <div id="podium"></div>

  <div id="stats"></div>
  <div id="updated"></div>

  <h2>⏭ Ottelut</h2>
  <div id="matches"></div>

  <h2>📊 Tilanne</h2>
  <div id="list"></div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxjUWbC3vZohnI2ig40tF18Z5-Ba62S6ff8QDtHhhX55nQn1TtH6B5_vS4I_ly1AfY5Dg/exec";



function getClass(index) {
  if (index === 0) return "card top1";
  if (index === 1) return "card top2";
  if (index === 2) return "card top3";
  return "card";
}

function renderPredictions(predictions) {

  let html = "";

  Object.entries(predictions).forEach(([section, values]) => {

    html += `<div style="margin-top:10px;">`;
    html += `<strong>${section}</strong><br>`;

    values.forEach(v => {
      html += `• ${v}<br>`;
    });

    html += `</div>`;
  });

  return html;
}

function toggleDetails(id) {

  const el = document.getElementById(`details-${id}`);

  if (el.style.display === "none") {
    el.style.display = "block";
  } else {
    el.style.display = "none";
  }
}


function renderPodium(data) {

  const top3 = data.slice(0, 3);

  document.getElementById("podium").innerHTML = `
    <div class="podium-card silver">
      <h2>🥈</h2>
      <div>${top3[1]?.name || "-"}</div>
      <strong>${top3[1]?.total || 0} p</strong>
    </div>

    <div class="podium-card gold">
      <h1>🥇</h1>
      <div>${top3[0]?.name || "-"}</div>
      <strong>${top3[0]?.total || 0} p</strong>
    </div>

    <div class="podium-card bronze">
      <h2>🥉</h2>
      <div>${top3[2]?.name || "-"}</div>
      <strong>${top3[2]?.total || 0} p</strong>
    </div>
  `;
}

function renderMatches(matches) {

  const el = document.getElementById("matches");
  el.innerHTML = "";

  if (!Array.isArray(matches) || matches.length === 0) {
    el.innerHTML = "<div class='card'>Ei otteluita</div>";
    return;
  }

  const now = Date.now();
  const end = now + 24 * 60 * 60 * 1000;

  const filtered = matches.filter(m =>
    m.time && m.time >= now && m.time <= end
  );

  if (filtered.length === 0) {
    el.innerHTML = "<div class='card'>Ei otteluita seuraavan 24h aikana</div>";
    return;
  }

  filtered
    .sort((a,b) => a.time - b.time)
    .forEach(m => {

      const div = document.createElement("div");
      div.className = "card";

      const home = parseFloat(m.homePct) || 0;
      const draw = parseFloat(m.drawPct) || 0;
      const away = parseFloat(m.awayPct) || 0;

      div.innerHTML = `
        <div style="font-weight:bold">${m.match}</div>

        <div class="match-meta">
          ${new Date(m.time).toLocaleString("fi-FI")}
          • Lohko ${m.group || "-"}
          • 📺 ${m.tv || "-"}
        </div>

        <div class="predictions">

          <div class="prediction-bar">

            <div
              class="prediction-home"
              style="width:${home}%">
              ${home > 12 ? `1 ${home.toFixed(0)}%` : ""}
            </div>

            <div
              class="prediction-draw"
              style="width:${draw}%">
              ${draw > 12 ? `X ${draw.toFixed(0)}%` : ""}
            </div>

            <div
              class="prediction-away"
              style="width:${away}%">
              ${away > 12 ? `2 ${away.toFixed(0)}%` : ""}
            </div>

          </div>

          <div class="prediction-labels">
            <span>1: ${home.toFixed(2)}%</span>
            <span>X: ${draw.toFixed(2)}%</span>
            <span>2: ${away.toFixed(2)}%</span>
          </div>

        </div>
      `;

      el.appendChild(div);
    });
}

function render(data) {

  const el = document.getElementById("list");
  el.innerHTML = "";

  data.forEach((p, i) => {

    const diff = p.change24h || 0;

    let diffText = "";
    if (diff > 0) diffText = ` <span style="color:#22c55e;">▲${diff}</span>`;
    else if (diff < 0) diffText = ` <span style="color:#ef4444;">▼${Math.abs(diff)}</span>`;

    const div = document.createElement("div");
    div.className = getClass(i);

    div.innerHTML = `
      <div onclick="toggleDetails(${i})" style="cursor:pointer;">

        <span class="name">#${i+1} ${p.name}</span>
        <span class="points">${p.total} p${diffText}</span>

      </div>

      <div class="details">
        <span class="badge">Alkusarja: ${p.sections.Alkusarja || 0}</span>
        <span class="badge">Top32: ${p.sections.top32 || 0}</span>
        <span class="badge">Top16: ${p.sections.top16 || 0}</span>
        <span class="badge">Top8: ${p.sections.top8 || 0}</span>
        <span class="badge">Top4: ${p.sections.top4 || 0}</span>
        <span class="badge">Loput: ${p.sections.Loput || 0}</span>
     </div>

     <div id="details-${i}" style="display:none; margin-top:15px;">
       ${renderPredictions(p.predictions)}
     </div>
    `;

    el.appendChild(div);
  });
}

async function load() {

  try {

    const res = await fetch(API_URL);
    const data = await res.json();
    
    console.log("OTTELUT:", data.ottelut);

    const ranking = data.ranking || [];

    renderPodium(ranking);
    render(ranking);

    document.getElementById("stats").innerHTML =
      `👥 Osallistujia: ${ranking.length}`;

    document.getElementById("updated").innerHTML =
      `⏰ Päivitetty: ${new Date().toLocaleTimeString("fi-FI")}`;

    renderMatches(data.ottelut || []);


  } catch (err) {

    console.error(err);

    document.getElementById("updated").innerHTML =
      "⚠️ Tietojen lataus epäonnistui";
  }
}

load();
setInterval(load, 30000);

</script>

</body>
</html>
